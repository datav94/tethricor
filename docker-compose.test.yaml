# Complete, self-contained LOCAL TEST stack for Tethricor.
#
# Brings up the three platform doubles (agent-runtime, MCP, AgentGateway) plus a
# runnable harness that exercises the full flow end-to-end, entirely offline:
#
#   harness (shim)  --exec-->  mock-sandbox  --clone /samples/demo (code IN)
#                                            --runs task, produces changed files
#                   <--zip---  mock-sandbox  (code OUT: changes.zip -> ./test-harness/out)
#   harness LLM/MCP  ------->  mock-gateway / mock-mcp
#
# Everything builds from source in this repo — no private registry needed.
#
#   docker compose -f docker-compose.test.yaml up --build
#
# When the `harness` service exits, look in ./test-harness/out/changes.zip.
# See docs/TESTING.md for the full walkthrough.

services:
  mock-gateway:
    build:
      context: ./local-dev
      dockerfile: Dockerfile.mock-gateway
    networks: [tethricor]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8081/healthz')"]
      interval: 3s
      timeout: 3s
      retries: 10

  mock-mcp:
    build:
      context: ./local-dev
      dockerfile: Dockerfile.mock-mcp
    networks: [tethricor]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:9090/healthz')"]
      interval: 3s
      timeout: 3s
      retries: 10

  mock-sandbox:
    build:
      context: ./local-dev
      dockerfile: Dockerfile.mock-sandbox
    networks: [tethricor]
    # Seed a throwaway git repo from the read-only sample mount, then start the mock.
    command:
      - sh
      - -c
      - |
        cp -r /samples/demo-src /samples/demo && \
        cd /samples/demo && git init -q && \
        git -c user.email=demo@tethricor -c user.name=demo add -A && \
        git -c user.email=demo@tethricor -c user.name=demo commit -qm seed && \
        cd /app && python mock_sandbox.py
    volumes:
      - ./test-harness/sample-repo:/samples/demo-src:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 3s
      timeout: 3s
      retries: 10

  # The harness sidecar (local test image = shim only). Runs one demo task and exits.
  harness:
    build:
      context: .
      dockerfile: docker/Dockerfile.harness-local
    depends_on:
      mock-sandbox: {condition: service_healthy}
      mock-mcp: {condition: service_healthy}
      mock-gateway: {condition: service_healthy}
    networks: [tethricor]
    working_dir: /out
    environment:
      TETHRICOR_HARNESS_TYPE: hermes
      TETHRICOR_CONFIG_PATH: /etc/tethricor/harness.yaml
      TETHRICOR_RUNTIME_URL: http://mock-sandbox:8080
      TETHRICOR_GATEWAY_URL: http://mock-gateway:8081
      TETHRICOR_MCP_URL: http://mock-mcp:9090
    volumes:
      - ./test-harness/harness.yaml:/etc/tethricor/harness.yaml:ro
      - ./test-harness/out:/out
    # Task argv is forwarded to the agent-runtime session (runs in the cloned repo).
    command:
      - "--"
      - sh
      - -c
      - |
        echo 'added by the harness demo' >> README.md && \
        echo 'generated by the harness task' > GENERATED.txt && \
        echo 'harness task complete'
    restart: "no"

networks:
  tethricor:
    driver: bridge
